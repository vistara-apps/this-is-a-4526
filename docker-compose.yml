version: '3.8'

services:
  gigflow-app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    volumes:
      - ./dist:/app/dist
    restart: unless-stopped

  # Optional: Add a reverse proxy for production
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl  # For SSL certificates
    depends_on:
      - gigflow-app
    restart: unless-stopped

  # Optional: Add a database for local development
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: gigflow
      POSTGRES_USER: gigflow
      POSTGRES_PASSWORD: gigflow_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
